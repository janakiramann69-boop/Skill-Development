<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Clone</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#eaeded;
    }

    /* Navbar */
    .navbar{
      background:#131921;
      color:white;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 30px;
      flex-wrap:wrap;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      color:#ff9900;
    }

    .search-box{
      display:flex;
      width:50%;
      min-width:250px;
    }

    .search-box input{
      width:100%;
      padding:10px;
      border:none;
      outline:none;
    }

    .search-box button{
      padding:10px 20px;
      border:none;
      background:#febd69;
      cursor:pointer;
      font-weight:bold;
    }

    .nav-links{
      display:flex;
      gap:20px;
      font-size:14px;
    }

    /* Hero Section */
    .hero{
      height:350px;
      background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30') center/cover;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding-left:50px;
      color:white;
    }

    .hero h1{
      font-size:50px;
    }

    .hero p{
      font-size:22px;
      margin-top:10px;
    }

    /* Products */
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:40px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      text-align:center;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      border-radius:5px;
    }

    .card h3{
      margin:15px 0 10px;
    }

    .price{
      color:green;
      font-weight:bold;
      font-size:18px;
    }

    .card button{
      margin-top:15px;
      padding:10px 20px;
      border:none;
      background:#ffd814;
      border-radius:20px;
      cursor:pointer;
      font-weight:bold;
    }

    .card button:hover{
      background:#f7ca00;
    }

    /* Footer */
    footer{
      background:#131921;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:20px;
    }

    /* Responsive */
    @media(max-width:768px){

      .navbar{
        flex-direction:column;
        gap:15px;
      }

      .search-box{
        width:100%;
      }

      .hero{
        text-align:center;
        padding-left:0;
      }

      .hero h1{
        font-size:35px;
      }
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">

    <div class="logo">amazon</div>

    <div class="search-box">
      <input type="text" placeholder="Search Amazon">
      <button>Search</button>
    </div>

    <div class="nav-links">
      <p>Hello, Sign In</p>
      <p>Orders</p>
      <p>Cart 🛒</p>
    </div>

  </div>

  <!-- Hero -->
  <section class="hero">
    <h1>Welcome to Amazon Clone</h1>
    <p>Discover Amazing Products Online</p>
  </section>

  <!-- Products -->
  <section class="products">

    <div class="card">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Wireless Headphones</h3>
      <p class="price">$49.99</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Smart Watch</h3>
      <p class="price">$89.99</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Laptop</h3>
      <p class="price">$599.99</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250" alt="">
      <h3>Running Shoes</h3>
      <p class="price">$39.99</p>
      <button>Add to Cart</button>
    </div>

  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Amazon Clone | HTML & CSS</p>
  </footer>

</body>
</html>
