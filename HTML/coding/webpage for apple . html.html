<!DOCTYPE html>
<html>
<head>
    <title>My Apple Webpage</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #1d1d1f; }
        p { color: #86868b; }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #0071e3;
            color: white;
            text-decoration: none;
            border-radius: 980px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello from Mac</h1>
        <p>This is a clean, responsive webpage built on an Apple device.</p>
        <a href="#" class="button">Learn More</a>
    </div>

</body>
</html>
