<body>

<div class="form-container">
    <h2>Student ID Form</h2>
    <form action="#">
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="firstname" placeholder="Enter first name" required>
<br>
        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lastname" placeholder="Enter last name" required>
<br>
        <label for="sid">Student ID Number</label>
        <input type="number" id="sid" name="studentid" placeholder="e.g. 20261001" required>
<br>
        <label for="dept">Department</label>
        <select id="dept" name="department">
            <option value="cs">Computer Science</option>
            <option value="it">Information Technology</option>
            <option value="ece">Electronics</option>
            <option value="mech">Mechanical</option>
        </select>
<br>
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="birthday">
<br>
        <label for="photo">Upload Profile Photo</label>
        <input type="file" id="photo" name="profile_pic" accept="image/*">
<br>
        <button type="submit">Generate ID Card</button>
    </form>
</div>

</body>
