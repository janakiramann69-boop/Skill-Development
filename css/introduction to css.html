<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: lightblue;
            /* New: Center everything and add padding */
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        h1 {
            color: white;
            text-align: center;
            /* New: Text shadow and background box */
            background-color: #2c3e50;
            padding: 20px 40px;
            border-radius: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            border: 4px solid white;
        }

        p {
            font-family: verdana;
            font-size: 20px;
            /* New: Spacing and container styling */
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 8px;
            max-width: 500px;
            line-height: 1.6;
            color: #333;
        }
        
        /* New: Adding a hover effect to the heading */
        h1:hover {
            background-color: #34495e;
            transform: scale(1.05);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <h1>My First CSS Example</h1>
    <p>This is a paragraph styled with expanded CSS properties in VS Code.</p>

</body>
</html>
