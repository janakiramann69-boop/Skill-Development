<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph Styling & ID Selectors</title>
    
    <style>
        /* General styling for all paragraphs */
        p {
            font-family: sans-serif;
            color: #333;
        }

        /* Specific styling for the ID */
        #para1 {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p>Every paragraph will be affected by the style.</p>
    <p id="para1">Me too! (I am special because of my ID)</p>
    <p>And me!</p>

</body>
</html>
