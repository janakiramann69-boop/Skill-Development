<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ID Selectors and Paragraph Practice</title>
    
    <style>
        /* General style for all paragraphs */
        p {
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
        }

        /* Specific style for the unique ID */
        #para1 {
            color: #2563eb;
            font-weight: bold;
            border-left: 4px solid #2563eb;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <p>Every paragraph will be affected by the style.</p>
    
    <p id="para1">Me too! (I have a unique ID style)</p>
    
    <p>And me!</p>

</body>
</html>
